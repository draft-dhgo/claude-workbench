<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3a"/>
      <stop offset="100%" style="stop-color:#12122a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8854a"/>
      <stop offset="100%" style="stop-color:#d4622b"/>
    </linearGradient>
    <linearGradient id="bracket" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a0a0cc"/>
      <stop offset="100%" style="stop-color:#6a6a9a"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="64" y="64" width="896" height="896" rx="200" ry="200" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="80" y="80" width="864" height="864" rx="188" ry="188" fill="none" stroke="#2a2a50" stroke-width="2"/>

  <!-- Left angle bracket < -->
  <path d="M340 360 L220 512 L340 664"
        fill="none" stroke="url(#bracket)" stroke-width="56" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right angle bracket > -->
  <path d="M684 360 L804 512 L684 664"
        fill="none" stroke="url(#bracket)" stroke-width="56" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Center: stylized tool/slash in Claude orange -->
  <line x1="440" y1="310" x2="584" y2="714"
        stroke="url(#glow)" stroke-width="60" stroke-linecap="round"/>

  <!-- Accent dots -->
  <circle cx="440" cy="310" r="16" fill="#e8854a" opacity="0.9"/>
  <circle cx="584" cy="714" r="16" fill="#d4622b" opacity="0.9"/>
</svg>
