<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.6; color: #1f2328; background: #f6f8fa; }
header { background: #24292f; color: #fff; padding: 16px 24px; }
header h1 { font-size: 1.3em; font-weight: 600; }
header p { color: #7d8590; font-size: 0.85em; margin-top: 4px; }
main { max-width: 960px; margin: 24px auto; padding: 0 16px; }
.cycle-card { background: #fff; border: 1px solid #d0d7de; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
.cycle-card h2 { font-size: 1.1em; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75em; font-weight: 600; color: #fff; }
.badge-dev { background: #238636; }
.badge-pass { background: #238636; }
.artifact-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
.artifact-link { display: block; padding: 8px 12px; border: 1px solid #d0d7de; border-radius: 6px; text-decoration: none; color: #0969da; font-size: 0.85em; text-align: center; transition: background 0.15s; }
.artifact-link:hover { background: #ddf4ff; }
.artifact-link.missing { color: #57606a; border-style: dashed; }
footer { text-align: center; color: #57606a; font-size: 0.8em; padding: 24px; }
</style>
</head>
