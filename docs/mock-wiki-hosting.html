<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<style>
[data-theme="dark"] {
  --bg-primary: #282420; --bg-card: #332e28; --bg-input: #1e1a15; --bg-hover: #3d3730;
  --text-primary: #f0e6d6; --text-secondary: #e8e0d4; --text-muted: #9a9080;
  --accent-primary: #c47a2a;
  --border-primary: #4a4035; --border-subtle: #3a3530;
  --btn-bg: #3d3730; --btn-secondary-text: #d4c4a8;
  --badge-bg: #3a2e1a; --badge-text: #e8b060; --badge-border: #5a4820;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-secondary); display: flex; justify-content: center; padding: 40px; }
.window { width: 900px; background: var(--bg-primary); border-radius: 12px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.4); border: 1px solid var(--border-subtle); }
.titlebar { height: 38px; background: var(--bg-card); display: flex; align-items: center; padding: 0 14px; gap: 8px; border-bottom: 1px solid var(--border-subtle); }
.dot { width: 12px; height: 12px; border-radius: 50%; }
.dot-r { background: #ff5f57; } .dot-y { background: #febc2e; } .dot-g { background: #28c840; }
.titlebar-text { flex: 1; text-align: center; color: var(--text-muted); font-size: 13px; font-weight: 500; }
.container { padding: 24px 20px; }
.app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.app-header-left h1 { font-size: 22px; font-weight: 700; color: var(--text-primary); }
.app-header-left p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.mode-toggle { display: inline-flex; border: 1px solid var(--border-primary); border-radius: 8px; overflow: hidden; background: var(--bg-card); }
.mode-btn { padding: 6px 20px; border: none; background: transparent; color: var(--text-muted); font-size: 13px; font-weight: 500; }
.mode-btn.active { background: var(--accent-primary); color: #fff; }
.app-header-right { display: flex; align-items: center; gap: 10px; }
.theme-btn { width: 32px; height: 32px; border: 1px solid var(--border-primary); border-radius: 6px; background: transparent; color: var(--text-muted); font-size: 14px; }
.lang-select { background: var(--bg-card); border: 1px solid var(--border-primary); color: var(--text-muted); border-radius: 6px; padding: 4px 8px; font-size: 12px; }
.tab-nav { display: flex; background: var(--bg-card); border-bottom: 1px solid var(--border-subtle); margin: 0 -20px; padding: 0 20px; margin-bottom: 20px; gap: 2px; }
.tab-btn { padding: 10px 18px; border: none; border-bottom: 2px solid transparent; background: transparent; color: var(--text-muted); font-size: 13px; font-weight: 500; margin-bottom: -1px; }
.tab-btn.active { color: var(--accent-primary); border-bottom-color: var(--accent-primary); background: var(--bg-hover); }
.btn { padding: 7px 14px; border-radius: 6px; border: 1px solid var(--border-primary); background: var(--btn-bg); color: var(--btn-secondary-text); font-size: 13px; font-weight: 500; }
.btn-primary { background: var(--accent-primary); border-color: var(--accent-primary); color: #fff; font-weight: 600; }
.btn-secondary { background: var(--btn-bg); color: var(--btn-secondary-text); }
.btn-danger { background: transparent; border: 1px solid #5a2020; color: #cf6679; }
.ws-section { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 10px; padding: 16px; margin-bottom: 14px; }
.section-label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 12px; }
.ws-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
.ws-card { display: flex; align-items: center; justify-content: space-between; background: var(--bg-input); border: 1px solid var(--border-subtle); border-radius: 8px; padding: 10px 14px; }
.ws-card-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
.ws-card-path { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.ws-badge { display: inline-block; padding: 2px 8px; border-radius: 8px; font-size: 11px; font-weight: 700; margin-right: 6px; }
.ws-badge-worktree { background: #1a3d2a; color: #66cf8a; border: 1px solid #205a30; }
.ws-badge-empty { background: #1a2a3d; color: #66a0cf; border: 1px solid #203a5a; }
.wh-status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.wh-indicator { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; }
.wh-running-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #66cf8a; box-shadow: 0 0 6px rgba(102,207,138,0.5); }
.wh-url { font-family: 'SF Mono', monospace; font-size: 12px; color: #64b5f6; text-decoration: underline; cursor: pointer; }
.wh-controls { display: flex; gap: 8px; }
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">
    <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
    <div class="titlebar-text">Claude Workbench</div>
  </div>
  <div class="container">
    <header class="app-header">
      <div class="app-header-left">
        <h1>Claude Workbench</h1>
        <p>App version: v1.2.0</p>
      </div>
      <div>
        <div class="mode-toggle">
          <button class="mode-btn active">Workspace</button>
          <button class="mode-btn">Worktree</button>
        </div>
      </div>
      <div class="app-header-right">
        <button class="theme-btn">🌙</button>
        <select class="lang-select"><option>English</option><option>한국어</option></select>
      </div>
    </header>
    <nav class="tab-nav">
      <button class="tab-btn">Command Queue</button>
      <button class="tab-btn active">Workspace Management</button>
    </nav>

    <!-- Workspace List -->
    <div class="ws-section">
      <label class="section-label">Workspace List</label>
      <div class="ws-list">
        <div class="ws-card">
          <div>
            <div class="ws-card-name"><span class="ws-badge ws-badge-worktree">WORKTREE</span>my-project</div>
            <div class="ws-card-path">~/workspaces/my-project</div>
          </div>
          <div style="display:flex;gap:6px;">
            <button class="btn btn-secondary" style="font-size:12px;padding:4px 10px;">Terminal</button>
            <button class="btn btn-secondary" style="font-size:12px;padding:4px 10px;">Wiki</button>
            <button class="btn btn-danger" style="font-size:12px;padding:4px 10px;">Delete</button>
          </div>
        </div>
        <div class="ws-card" style="border-color: var(--accent-primary);">
          <div>
            <div class="ws-card-name"><span class="ws-badge ws-badge-empty">EMPTY</span>scrum-cycle</div>
            <div class="ws-card-path">~/workspaces/scrum-cycle</div>
          </div>
          <div style="display:flex;gap:6px;">
            <button class="btn btn-secondary" style="font-size:12px;padding:4px 10px;">Terminal</button>
            <button class="btn btn-secondary" style="font-size:12px;padding:4px 10px;">Wiki</button>
            <button class="btn btn-danger" style="font-size:12px;padding:4px 10px;">Delete</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Wiki Viewer Hosting -->
    <div class="ws-section">
      <label class="section-label">Wiki Viewer Hosting</label>
      <div class="wh-status-row">
        <span class="wh-indicator" style="color:#66cf8a;"><span class="wh-running-dot"></span>Running</span>
        <span class="wh-url">http://localhost:8080</span>
      </div>
      <div class="wh-controls">
        <button class="btn btn-primary" style="opacity:0.35;" disabled>Start Hosting</button>
        <button class="btn btn-secondary">Stop Hosting</button>
      </div>
    </div>

  </div>
</div>
</body>
</html>
