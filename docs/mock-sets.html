<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<style>
[data-theme="dark"] {
  --bg-primary: #282420; --bg-card: #332e28; --bg-input: #1e1a15; --bg-hover: #3d3730;
  --text-primary: #f0e6d6; --text-secondary: #e8e0d4; --text-muted: #9a9080;
  --accent-primary: #c47a2a;
  --border-primary: #4a4035; --border-subtle: #3a3530;
  --btn-bg: #3d3730; --btn-secondary-text: #d4c4a8;
  --badge-bg: #3a2e1a; --badge-text: #e8b060; --badge-border: #5a4820;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-secondary); display: flex; justify-content: center; padding: 40px; }
.window { width: 900px; background: var(--bg-primary); border-radius: 12px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.4); border: 1px solid var(--border-subtle); }
.titlebar { height: 38px; background: var(--bg-card); display: flex; align-items: center; padding: 0 14px; gap: 8px; border-bottom: 1px solid var(--border-subtle); }
.dot { width: 12px; height: 12px; border-radius: 50%; }
.dot-r { background: #ff5f57; } .dot-y { background: #febc2e; } .dot-g { background: #28c840; }
.titlebar-text { flex: 1; text-align: center; color: var(--text-muted); font-size: 13px; font-weight: 500; }
.container { padding: 24px 20px; }
.app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.app-header-left h1 { font-size: 22px; font-weight: 700; color: var(--text-primary); }
.app-header-left p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.mode-toggle { display: inline-flex; border: 1px solid var(--border-primary); border-radius: 8px; overflow: hidden; background: var(--bg-card); }
.mode-btn { padding: 6px 20px; border: none; background: transparent; color: var(--text-muted); font-size: 13px; font-weight: 500; }
.mode-btn.active { background: var(--accent-primary); color: #fff; }
.app-header-right { display: flex; align-items: center; gap: 10px; }
.theme-btn { width: 32px; height: 32px; border: 1px solid var(--border-primary); border-radius: 6px; background: transparent; color: var(--text-muted); cursor: pointer; font-size: 14px; }
.lang-select { background: var(--bg-card); border: 1px solid var(--border-primary); color: var(--text-muted); border-radius: 6px; padding: 4px 8px; font-size: 12px; }
.tab-nav { display: flex; background: var(--bg-card); border-bottom: 1px solid var(--border-subtle); margin: 0 -20px; padding: 0 20px; margin-bottom: 20px; gap: 2px; }
.tab-btn { padding: 10px 18px; border: none; border-bottom: 2px solid transparent; background: transparent; color: var(--text-muted); font-size: 13px; font-weight: 500; margin-bottom: -1px; }
.tab-btn.active { color: var(--accent-primary); border-bottom-color: var(--accent-primary); background: var(--bg-hover); }
.btn { padding: 7px 14px; border-radius: 6px; border: 1px solid var(--border-primary); background: var(--btn-bg); color: var(--btn-secondary-text); font-size: 13px; font-weight: 500; cursor: pointer; }
.btn-primary { background: var(--accent-primary); border-color: var(--accent-primary); color: #fff; font-weight: 600; }
.btn-secondary { background: var(--btn-bg); color: var(--btn-secondary-text); }
.btn-danger { background: transparent; border: 1px solid #5a2020; color: #cf6679; }
.action-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.set-list { display: flex; flex-direction: column; gap: 10px; }
.set-card { display: flex; align-items: center; background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 8px; padding: 14px 18px; }
.set-card-info { flex: 1; }
.set-card-name { font-size: 14px; font-weight: 600; color: var(--accent-primary); margin-bottom: 4px; }
.set-card-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 14px; }
.set-card-badge { display: inline-block; background: var(--badge-bg); color: var(--badge-text); padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; margin-right: 8px; border: 1px solid var(--badge-border); }
.set-card-actions { display: flex; gap: 6px; }
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">
    <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
    <div class="titlebar-text">Claude Workbench</div>
  </div>
  <div class="container">
    <header class="app-header">
      <div class="app-header-left">
        <h1>Claude Workbench</h1>
        <p>App version: v1.2.0</p>
      </div>
      <div>
        <div class="mode-toggle">
          <button class="mode-btn active">Workspace</button>
          <button class="mode-btn">Worktree</button>
        </div>
      </div>
      <div class="app-header-right">
        <button class="theme-btn">🌙</button>
        <select class="lang-select"><option>English</option><option>한국어</option></select>
      </div>
    </header>
    <nav class="tab-nav">
      <button class="tab-btn">Command Queue</button>
      <button class="tab-btn active">Workspace Management</button>
    </nav>
    <div class="action-bar">
      <button class="btn btn-secondary">+ Add Workspace</button>
      <button class="btn btn-primary">+ Create Workspace</button>
    </div>
    <div class="set-list">
      <div class="set-card">
        <div class="set-card-info">
          <div class="set-card-name">my-project</div>
          <div class="set-card-meta"><span class="set-card-badge">WORKTREE</span><span>~/workspaces/my-project</span></div>
        </div>
        <div class="set-card-actions">
          <button class="btn btn-secondary" style="padding:5px 10px;font-size:12px;">Open Terminal</button>
          <button class="btn btn-secondary" style="padding:5px 10px;font-size:12px;">Wiki</button>
          <button class="btn btn-danger" style="padding:5px 10px;font-size:12px;">Delete</button>
        </div>
      </div>
      <div class="set-card" style="border-color: var(--accent-primary);">
        <div class="set-card-info">
          <div class="set-card-name">scrum-cycle</div>
          <div class="set-card-meta"><span class="set-card-badge" style="background:#1a2a3d;color:#66a0cf;border-color:#203a5a;">EMPTY</span><span>~/workspaces/scrum-cycle</span></div>
        </div>
        <div class="set-card-actions">
          <button class="btn btn-secondary" style="padding:5px 10px;font-size:12px;">Open Terminal</button>
          <button class="btn btn-secondary" style="padding:5px 10px;font-size:12px;">Wiki</button>
          <button class="btn btn-danger" style="padding:5px 10px;font-size:12px;">Delete</button>
        </div>
      </div>
      <div class="set-card">
        <div class="set-card-info">
          <div class="set-card-name">api-server</div>
          <div class="set-card-meta"><span class="set-card-badge">WORKTREE</span><span>~/workspaces/api-server</span></div>
        </div>
        <div class="set-card-actions">
          <button class="btn btn-secondary" style="padding:5px 10px;font-size:12px;">Open Terminal</button>
          <button class="btn btn-secondary" style="padding:5px 10px;font-size:12px;">Wiki</button>
          <button class="btn btn-danger" style="padding:5px 10px;font-size:12px;">Delete</button>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
