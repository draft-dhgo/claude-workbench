<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #110f0a; display: flex; justify-content: center; padding: 40px; }
.window { width: 860px; background: #1f1b16; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.6); border: 1px solid #3a3530; }
.titlebar { height: 38px; background: #17140f; display: flex; align-items: center; padding: 0 14px; gap: 8px; }
.dot { width: 12px; height: 12px; border-radius: 50%; }
.dot-r { background: #ff5f57; } .dot-y { background: #febc2e; } .dot-g { background: #28c840; }
.titlebar-text { flex: 1; text-align: center; color: #7a7060; font-size: 13px; font-weight: 500; }
.container { padding: 24px 20px; max-width: 860px; }
.app-header { margin-bottom: 20px; }
h1 { font-size: 22px; font-weight: 700; color: #f0e6d6; }
.version { font-size: 12px; color: #9a9080; margin-top: 4px; }
.tab-nav { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid #3a3530; }
.tab-btn { padding: 10px 24px; border: none; background: transparent; color: #9a9080; font-size: 0.92em; font-weight: 500; border-bottom: 2px solid transparent; margin-bottom: -2px; }
.tab-btn.active { color: #f0e6d6; border-bottom-color: #c47a2a; }
.btn { padding: 8px 18px; border-radius: 6px; border: 1px solid #4a4035; background: #332d26; color: #e8e0d4; font-size: 0.9em; font-weight: 500; }
.btn-primary { background: linear-gradient(135deg, #c47a2a, #a05a1a); border-color: #c47a2a; color: #fff; font-weight: 600; box-shadow: 0 2px 8px rgba(196,122,42,0.3); }
.btn-secondary { background: #332d26; border-color: #4a4035; color: #d4c4a8; }
.btn-danger { background: transparent; border: 1px solid transparent; color: #cf6679; padding: 6px 12px; font-size: 0.85em; border-radius: 6px; }
.action-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.set-list { display: flex; flex-direction: column; gap: 12px; }
.set-card { display: flex; align-items: center; background: #2a2520; border: 1px solid #3a3530; border-radius: 8px; padding: 16px 20px; }
.set-card-info { flex: 1; }
.set-card-name { font-size: 1em; font-weight: 600; color: #d4a574; margin-bottom: 4px; }
.set-card-meta { font-size: 0.82em; color: #7a7060; display: flex; gap: 16px; }
.set-card-badge { display: inline-block; background: #3a2e1a; color: #e8b060; padding: 2px 10px; border-radius: 12px; font-size: 0.8em; font-weight: 500; margin-right: 12px; }
.set-card-actions { display: flex; gap: 4px; }
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">
    <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
    <div class="titlebar-text">Claude Workbench</div>
  </div>
  <div class="container">
    <header class="app-header"><h1>Claude Workbench</h1><p class="version">v1.0.0</p></header>
    <nav class="tab-nav">
      <button class="tab-btn">저장소 관리</button>
      <button class="tab-btn active">워크디렉토리 세트</button>
      <button class="tab-btn">워크스페이스 생성</button>
      <button class="tab-btn">워크스페이스 관리</button>
      <button class="tab-btn">워크트리 관리</button>
    </nav>
    <div class="action-bar"><button class="btn btn-primary">+ 세트 만들기</button></div>
    <div class="set-list">
      <div class="set-card">
        <div class="set-card-info"><div class="set-card-name">Backend Services</div><div class="set-card-meta"><span class="set-card-badge">3 repos</span><span>생성: 2026-03-05</span><span>수정: 2026-03-08</span></div></div>
        <div class="set-card-actions"><button class="btn-secondary btn" style="padding:6px 12px;font-size:0.85em;">편집</button><button class="btn-danger">삭제</button></div>
      </div>
      <div class="set-card">
        <div class="set-card-info"><div class="set-card-name">Frontend Apps</div><div class="set-card-meta"><span class="set-card-badge">2 repos</span><span>생성: 2026-03-06</span><span>수정: 2026-03-07</span></div></div>
        <div class="set-card-actions"><button class="btn-secondary btn" style="padding:6px 12px;font-size:0.85em;">편집</button><button class="btn-danger">삭제</button></div>
      </div>
      <div class="set-card">
        <div class="set-card-info"><div class="set-card-name">Full Stack Project</div><div class="set-card-meta"><span class="set-card-badge">5 repos</span><span>생성: 2026-03-01</span><span>수정: 2026-03-08</span></div></div>
        <div class="set-card-actions"><button class="btn-secondary btn" style="padding:6px 12px;font-size:0.85em;">편집</button><button class="btn-danger">삭제</button></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
