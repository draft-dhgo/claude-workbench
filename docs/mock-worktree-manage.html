<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #110f0a; display: flex; justify-content: center; padding: 40px; }
.window { width: 860px; background: #1f1b16; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.6); border: 1px solid #3a3530; }
.titlebar { height: 38px; background: #17140f; display: flex; align-items: center; padding: 0 14px; gap: 8px; }
.dot { width: 12px; height: 12px; border-radius: 50%; }
.dot-r { background: #ff5f57; } .dot-y { background: #febc2e; } .dot-g { background: #28c840; }
.titlebar-text { flex: 1; text-align: center; color: #7a7060; font-size: 13px; font-weight: 500; }
.container { padding: 24px 20px; max-width: 860px; }
.app-header { margin-bottom: 20px; }
h1 { font-size: 22px; font-weight: 700; color: #f0e6d6; }
.version { font-size: 12px; color: #9a9080; margin-top: 4px; }
.tab-nav { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid #3a3530; }
.tab-btn { padding: 10px 24px; border: none; background: transparent; color: #9a9080; font-size: 0.92em; font-weight: 500; border-bottom: 2px solid transparent; margin-bottom: -2px; }
.tab-btn.active { color: #f0e6d6; border-bottom-color: #c47a2a; }
.btn { padding: 8px 18px; border-radius: 6px; border: 1px solid #4a4035; background: #332d26; color: #e8e0d4; font-size: 0.9em; font-weight: 500; }
.btn-secondary { background: #332d26; border-color: #4a4035; color: #d4c4a8; }
.btn-danger { background: transparent; border: 1px solid #5a2020; color: #cf6679; padding: 6px 14px; font-size: 0.85em; border-radius: 6px; }
.btn-danger-disabled { opacity: 0.35; }
.form-input { width: 100%; padding: 10px 14px; border: 1px solid #4a4035; border-radius: 6px; background: #17140f; color: #e8e0d4; font-size: 0.92em; }
.action-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.rm-repo-select { flex: 1; max-width: 360px; }
.rm-card-list { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
.wt-card { background: #2a2520; border: 1px solid #3a3530; border-radius: 8px; padding: 16px 20px; }
.wt-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.wt-card-branch { font-size: 1em; font-weight: 700; color: #d4a574; font-family: 'SF Mono', monospace; }
.wt-card-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.78em; font-weight: 700; }
.wt-badge-pushed { background: #1a3d2a; color: #66cf8a; border: 1px solid #205a30; }
.wt-badge-unpushed { background: #3d1a1a; color: #cf6679; border: 1px solid #5a2020; }
.wt-card-path { font-size: 0.83em; color: #9a9080; font-family: 'SF Mono', monospace; word-break: break-all; margin-bottom: 12px; }
.wt-card-actions { display: flex; justify-content: flex-end; gap: 8px; }
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">
    <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
    <div class="titlebar-text">Claude Workbench</div>
  </div>
  <div class="container">
    <header class="app-header" style="display:flex;align-items:center;justify-content:space-between;">
      <div><h1>Claude Workbench</h1><p class="version">v1.0.0</p></div>
      <select style="padding:4px 8px;border:1px solid #4a4035;border-radius:4px;background:#17140f;color:#e8e0d4;font-size:0.82em;"><option>English</option><option>한국어</option></select>
    </header>
    <nav class="tab-nav">
      <button class="tab-btn">Repositories</button>
      <button class="tab-btn">Workdir Sets</button>
      <button class="tab-btn">Create Workspace</button>
      <button class="tab-btn">Workspace Mgmt</button>
      <button class="tab-btn active">Worktree Mgmt</button>
    </nav>
    <div class="action-bar">
      <select class="form-input rm-repo-select" style="color:#e8b060;"><option>claude-workbench</option></select>
      <button class="btn btn-secondary">&#x21bb; Refresh</button>
    </div>
    <div class="rm-card-list">
      <div class="wt-card">
        <div class="wt-card-header"><span class="wt-card-branch">feature/login-api</span><span class="wt-card-badge wt-badge-pushed">pushed</span></div>
        <div class="wt-card-path">~/worktrees/feature-login-api/claude-workbench</div>
        <div class="wt-card-actions"><button class="btn btn-secondary" style="padding:6px 12px;font-size:0.85em;">Terminal</button><button class="btn-danger btn-danger-disabled">Delete</button></div>
      </div>
      <div class="wt-card">
        <div class="wt-card-header"><span class="wt-card-branch">feature/dashboard-ui</span><span class="wt-card-badge wt-badge-unpushed">unpushed</span></div>
        <div class="wt-card-path">~/worktrees/feature-dashboard/claude-workbench</div>
        <div class="wt-card-actions"><button class="btn btn-secondary" style="padding:6px 12px;font-size:0.85em;">Terminal</button><button class="btn-danger">Delete</button></div>
      </div>
      <div class="wt-card">
        <div class="wt-card-header"><span class="wt-card-branch">bugfix/auth-token</span><span class="wt-card-badge wt-badge-pushed">pushed</span></div>
        <div class="wt-card-path">~/worktrees/bugfix-auth/claude-workbench</div>
        <div class="wt-card-actions"><button class="btn btn-secondary" style="padding:6px 12px;font-size:0.85em;">Terminal</button><button class="btn-danger btn-danger-disabled">Delete</button></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
