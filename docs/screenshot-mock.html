<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<style>
[data-theme="dark"] {
  --bg-primary: #282420;
  --bg-card: #332e28;
  --bg-input: #1e1a15;
  --bg-hover: #3d3730;
  --text-primary: #f0e6d6;
  --text-secondary: #e8e0d4;
  --text-muted: #9a9080;
  --text-dim: #7a7060;
  --accent-primary: #c47a2a;
  --border-primary: #4a4035;
  --border-subtle: #3a3530;
  --btn-bg: #3d3730;
  --btn-secondary-text: #d4c4a8;
  --badge-bg: #3a2e1a;
  --badge-text: #e8b060;
  --badge-border: #5a4820;
  --success-bg: #1a3d2a;
  --success-text: #66cf8a;
  --success-border: #205a30;
}
[data-theme="light"] {
  --bg-primary: #f8f6f2;
  --bg-card: #ffffff;
  --bg-input: #f2efe8;
  --bg-hover: #efe9e0;
  --text-primary: #2c2418;
  --text-secondary: #4a4035;
  --text-muted: #8a8070;
  --text-dim: #a09888;
  --accent-primary: #c47a2a;
  --border-primary: #d8d0c4;
  --border-subtle: #e8e0d4;
  --btn-bg: #f0ebe4;
  --btn-secondary-text: #4a4035;
  --badge-bg: #fdf0e0;
  --badge-text: #9a6a20;
  --badge-border: #c8a870;
  --success-bg: #e8f8e8;
  --success-text: #28a745;
  --success-border: #a0d8a0;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-primary);
  color: var(--text-secondary);
  display: flex;
  justify-content: center;
  padding: 40px;
}
.window {
  width: 900px;
  background: var(--bg-primary);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  border: 1px solid var(--border-subtle);
}
.titlebar {
  height: 38px;
  background: var(--bg-card);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 8px;
  border-bottom: 1px solid var(--border-subtle);
}
.dot { width: 12px; height: 12px; border-radius: 50%; }
.dot-r { background: #ff5f57; } .dot-y { background: #febc2e; } .dot-g { background: #28c840; }
.titlebar-text { flex: 1; text-align: center; color: var(--text-muted); font-size: 13px; font-weight: 500; }
.container { padding: 24px 20px; }

/* Header */
.app-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.app-header-left h1 { font-size: 22px; font-weight: 700; color: var(--text-primary); }
.app-header-left p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.app-header-center { display: flex; align-items: center; }
.mode-toggle {
  display: inline-flex;
  border: 1px solid var(--border-primary);
  border-radius: 8px;
  overflow: hidden;
  background: var(--bg-card);
}
.mode-btn {
  padding: 6px 20px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
}
.mode-btn.active {
  background: var(--accent-primary);
  color: #fff;
}
.app-header-right { display: flex; align-items: center; gap: 10px; }
.theme-btn {
  width: 32px; height: 32px;
  border: 1px solid var(--border-primary);
  border-radius: 6px;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.lang-select {
  background: var(--bg-card);
  border: 1px solid var(--border-primary);
  color: var(--text-muted);
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 12px;
}

/* Tab Nav */
.tab-nav {
  display: flex;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border-subtle);
  margin: 0 -20px;
  padding: 0 20px;
  margin-bottom: 20px;
  gap: 2px;
}
.tab-btn {
  padding: 10px 18px;
  border: none;
  border-bottom: 2px solid transparent;
  background: transparent;
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  margin-bottom: -1px;
}
.tab-btn.active {
  color: var(--accent-primary);
  border-bottom-color: var(--accent-primary);
  background: var(--bg-hover);
}

/* Buttons */
.btn {
  padding: 7px 14px;
  border-radius: 6px;
  border: 1px solid var(--border-primary);
  background: var(--btn-bg);
  color: var(--btn-secondary-text);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
}
.btn-primary {
  background: var(--accent-primary);
  border-color: var(--accent-primary);
  color: #fff;
  font-weight: 600;
}
.btn-secondary { background: var(--btn-bg); color: var(--btn-secondary-text); }
.btn-danger { background: transparent; border: 1px solid #5a2020; color: #cf6679; }

/* Form */
.form-input {
  width: 100%;
  padding: 7px 10px;
  background: var(--bg-input);
  border: 1px solid var(--border-primary);
  border-radius: 6px;
  color: var(--text-primary);
  font-size: 13px;
}

/* Table */
.repo-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.repo-table th {
  text-align: left; padding: 10px 12px;
  font-weight: 600; font-size: 0.8em; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.04em;
  border-bottom: 2px solid var(--border-subtle);
}
.repo-table td { padding: 12px; border-bottom: 1px solid var(--border-subtle); vertical-align: middle; }
.repo-name { font-weight: 600; color: var(--accent-primary); }
.repo-path { color: var(--text-muted); font-size: 0.88em; font-family: 'SF Mono', monospace; }
.branch-badge {
  display: inline-block;
  background: var(--badge-bg);
  color: var(--badge-text);
  padding: 2px 10px; border-radius: 12px;
  font-size: 0.82em; font-weight: 500;
  font-family: 'SF Mono', monospace;
  border: 1px solid var(--badge-border);
}
.col-action { width: 60px; text-align: center; }
.btn-icon { background: transparent; border: none; color: #cf6679; font-size: 1.1em; cursor: pointer; }

/* Action bar */
.action-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.search-wrapper { flex: 1; max-width: 260px; margin-left: auto; }
.search-input {
  width: 100%; padding: 7px 12px;
  border: 1px solid var(--border-primary);
  border-radius: 6px;
  background: var(--bg-input);
  color: var(--text-muted); font-size: 13px;
}
.status-bar { margin-top: 12px; font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">
    <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
    <div class="titlebar-text">Claude Workbench</div>
  </div>
  <div class="container">
    <header class="app-header">
      <div class="app-header-left">
        <h1>Claude Workbench</h1>
        <p>App version: v1.2.0</p>
      </div>
      <div class="app-header-center">
        <div class="mode-toggle">
          <button class="mode-btn">Workspace</button>
          <button class="mode-btn active">Worktree</button>
        </div>
      </div>
      <div class="app-header-right">
        <button class="theme-btn">🌙</button>
        <select class="lang-select"><option>English</option><option>한국어</option></select>
      </div>
    </header>
    <nav class="tab-nav">
      <button class="tab-btn active">Repository Management</button>
      <button class="tab-btn">Worktree Management</button>
    </nav>
    <div class="action-bar">
      <button class="btn btn-primary">+ Add Repository</button>
      <div class="search-wrapper"><input type="text" class="search-input" placeholder="Search repositories..." /></div>
    </div>
    <table class="repo-table">
      <thead><tr><th>Name</th><th>Path</th><th>Branch</th><th class="col-action">Action</th></tr></thead>
      <tbody>
        <tr><td><span class="repo-name">claude-workbench</span></td><td><span class="repo-path">~/projects/claude-workbench</span></td><td><span class="branch-badge">main</span></td><td class="col-action"><button class="btn-icon">&times;</button></td></tr>
        <tr><td><span class="repo-name">api-server</span></td><td><span class="repo-path">~/projects/api-server</span></td><td><span class="branch-badge">develop</span></td><td class="col-action"><button class="btn-icon">&times;</button></td></tr>
        <tr><td><span class="repo-name">web-frontend</span></td><td><span class="repo-path">~/projects/web-frontend</span></td><td><span class="branch-badge">feature/auth</span></td><td class="col-action"><button class="btn-icon">&times;</button></td></tr>
      </tbody>
    </table>
    <div class="status-bar">3 repositories registered</div>
  </div>
</div>
</body>
</html>
