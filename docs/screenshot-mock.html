<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #110f0a; display: flex; justify-content: center; padding: 40px; }
.window { width: 860px; background: #1f1b16; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.6); border: 1px solid #3a3530; }
.titlebar { height: 38px; background: #17140f; display: flex; align-items: center; padding: 0 14px; gap: 8px; }
.dot { width: 12px; height: 12px; border-radius: 50%; }
.dot-r { background: #ff5f57; } .dot-y { background: #febc2e; } .dot-g { background: #28c840; }
.titlebar-text { flex: 1; text-align: center; color: #7a7060; font-size: 13px; font-weight: 500; }
.container { padding: 24px 20px; max-width: 860px; }
.app-header { margin-bottom: 20px; }
h1 { font-size: 22px; font-weight: 700; color: #f0e6d6; }
.version { font-size: 12px; color: #9a9080; margin-top: 4px; }
.tab-nav { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid #3a3530; }
.tab-btn { padding: 10px 24px; border: none; background: transparent; color: #9a9080; font-size: 0.92em; font-weight: 500; border-bottom: 2px solid transparent; margin-bottom: -2px; }
.tab-btn.active { color: #f0e6d6; border-bottom-color: #c47a2a; }
.action-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.btn { padding: 8px 18px; border-radius: 6px; border: 1px solid #4a4035; background: #332d26; color: #e8e0d4; font-size: 0.9em; font-weight: 500; }
.btn-primary { background: linear-gradient(135deg, #c47a2a, #a05a1a); border-color: #c47a2a; color: #fff; font-weight: 600; box-shadow: 0 2px 8px rgba(196,122,42,0.3); }
.search-wrapper { flex: 1; max-width: 260px; margin-left: auto; }
.search-input { width: 100%; padding: 8px 12px; border: 1px solid #4a4035; border-radius: 6px; background: #17140f; color: #7a7060; font-size: 0.9em; }
.repo-table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
.repo-table th { text-align: left; padding: 10px 12px; font-weight: 600; font-size: 0.8em; color: #9a9080; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 2px solid #3a3530; }
.repo-table td { padding: 12px; border-bottom: 1px solid #3a3530; vertical-align: middle; }
.repo-name { font-weight: 600; color: #d4a574; }
.repo-path { color: #9a9080; font-size: 0.88em; font-family: 'SF Mono', monospace; }
.branch-badge { display: inline-block; background: #3a2e1a; color: #e8b060; padding: 2px 10px; border-radius: 12px; font-size: 0.82em; font-weight: 500; font-family: 'SF Mono', monospace; }
.col-action { width: 60px; text-align: center; }
.btn-danger { background: transparent; border-color: transparent; color: #cf6679; padding: 4px 10px; font-size: 1.1em; border: none; }
.status-bar { margin-top: 12px; font-size: 0.82em; color: #7a7060; }
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">
    <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
    <div class="titlebar-text">Claude Workbench</div>
  </div>
  <div class="container">
    <header class="app-header" style="display:flex;align-items:center;justify-content:space-between;">
      <div><h1>Claude Workbench</h1><p class="version">v1.0.0</p></div>
      <select style="padding:4px 8px;border:1px solid #4a4035;border-radius:4px;background:#17140f;color:#e8e0d4;font-size:0.82em;"><option>English</option><option>한국어</option></select>
    </header>
    <nav class="tab-nav">
      <button class="tab-btn active">Repositories</button>
      <button class="tab-btn">Workdir Sets</button>
      <button class="tab-btn">Create Workspace</button>
      <button class="tab-btn">Workspace Mgmt</button>
      <button class="tab-btn">Worktree Mgmt</button>
    </nav>
    <div class="action-bar">
      <button class="btn btn-primary">+ Add Repository</button>
      <div class="search-wrapper"><input type="text" class="search-input" placeholder="Search repositories..." /></div>
    </div>
    <table class="repo-table">
      <thead><tr><th>Name</th><th>Path</th><th>Branch</th><th class="col-action">Actions</th></tr></thead>
      <tbody>
        <tr><td><span class="repo-name">claude-workbench</span></td><td><span class="repo-path">~/projects/claude-workbench</span></td><td><span class="branch-badge">main</span></td><td class="col-action"><button class="btn-danger">&times;</button></td></tr>
        <tr><td><span class="repo-name">api-server</span></td><td><span class="repo-path">~/projects/api-server</span></td><td><span class="branch-badge">develop</span></td><td class="col-action"><button class="btn-danger">&times;</button></td></tr>
        <tr><td><span class="repo-name">web-frontend</span></td><td><span class="repo-path">~/projects/web-frontend</span></td><td><span class="branch-badge">feature/auth</span></td><td class="col-action"><button class="btn-danger">&times;</button></td></tr>
      </tbody>
    </table>
    <div class="status-bar">3 repositories registered</div>
  </div>
</div>
</body>
</html>
